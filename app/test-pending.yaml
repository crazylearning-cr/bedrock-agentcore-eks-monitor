apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-app-pending
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: demo-app-pending
  template:
    metadata:
      labels:
        app: demo-app-pending
    spec:
      containers:
        - name: app
          image: nginx
          resources:
            requests:
              memory: "100Gi"   # deliberately exceeds node capacity
              cpu: "50"
            limits:
              memory: "100Gi"
              cpu: "50"
