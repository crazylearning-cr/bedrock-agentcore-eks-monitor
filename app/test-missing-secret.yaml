apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-app-missing-secret
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: demo-app-missing-secret
  template:
    metadata:
      labels:
        app: demo-app-missing-secret
    spec:
      containers:
        - name: app
          image: nginx
          env:
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: nonexistent-db-secret
                  key: password
